name: gitleaks
on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks scan
        run: |
          docker run --v $(pwd):/path zricethezav/gitleaks:latest detect --source="/path" --verbose --redact
